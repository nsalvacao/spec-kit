policy_version: "1"

version:
  canonical_file: "pyproject.toml"
  canonical_pattern: '^version\s*=\s*"(?P<version>[0-9]+\.[0-9]+\.[0-9]+(?:-fork\.[0-9]+)?)"\s*$'

changelog:
  file: "CHANGELOG.md"
  unreleased_heading: "## [Unreleased]"
  release_heading_pattern: '^## \[(?P<version>[0-9]+\.[0-9]+\.[0-9]+(?:-fork\.[0-9]+)?)\] - (?P<date>[0-9]{4}-[0-9]{2}-[0-9]{2})$'

monitoring:
  drift_sla_hours: 24

branch_hygiene:
  protected_exact:
    - "main"
  protected_prefixes:
    - "baseline/"
    - "intake/upstream-study-"
    - "automation/release-metadata-"

sync:
  allowlist:
    - "pyproject.toml"
    - "CHANGELOG.md"
