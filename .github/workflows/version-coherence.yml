name: Version Coherence

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag context (example: v0.0.53)"
        required: false
        type: string
      enforce_release_match:
        description: "Fail if canonical version does not match release tag context"
        required: false
        default: false
        type: boolean
      skip_runtime:
        description: "Skip runtime check (uv run specify version)"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "41 4 * * *"

permissions:
  contents: read

jobs:
  version-coherence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check pyyaml

      - name: Resolve release tag context
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ github.event.inputs.release_tag }}"
          if [[ -z "$tag" ]]; then
            tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name' 2>/dev/null || true)"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Run version coherence check
        id: coherence
        run: |
          set +e
          cmd=(python scripts/python/version-orchestrator.py check \
            --repo-root "$GITHUB_WORKSPACE" \
            --map .github/version-map.yml \
            --json)

          if [[ -n "${{ steps.tag.outputs.tag }}" ]]; then
            cmd+=(--release-tag "${{ steps.tag.outputs.tag }}")
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.enforce_release_match }}" == "true" ]]; then
            cmd+=(--enforce-release-match)
          fi
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.skip_runtime }}" == "true" ]]; then
            cmd+=(--skip-runtime)
          fi

          "${cmd[@]}" > coherence-result.json
          status=$?
          set -e

          echo "status=$status" >> "$GITHUB_OUTPUT"
          cat coherence-result.json

          {
            echo "## Version Coherence"
            echo ""
            echo "- Release tag context: \`${{ steps.tag.outputs.tag || 'none' }}\`"
            echo ""
            echo '```json'
            cat coherence-result.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce coherence
        if: steps.coherence.outputs.status != '0'
        run: |
          echo "Version coherence check failed." >&2
          exit 1
