name: Test

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: sudo apt-get install -y ripgrep

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest tests/ --tb=short -v

      - name: Run contract validation gates
        run: |
          uv run python scripts/python/template-instruction-contract.py validate --repo-root .
          uv run python scripts/python/handoff-metadata-lint.py templates --repo-root .
