# =============================================================================
# 🤖 AI Review — inline, no cross-repo reusable dependency
# Uses GitHub Models free tier — ZERO premium requests consumed
#
# Configurable via env block at the top of each job:
#   REVIEW_MODEL           — primary model for code review         (#77)
#   REVIEW_FALLBACK_MODEL  — fallback model if primary 429s        (#77)
#   REVIEW_FALLBACK_MODEL_2— 2nd fallback (higher rate limits)     (#77)
#   SUMMARY_MODEL          — primary model for PR summary          (#77)
#   SUMMARY_FALLBACK_MODEL — fallback model if primary 429s        (#77)
#   SUMMARY_FALLBACK_MODEL_2— 2nd fallback (higher rate limits)    (#77)
#   MAX_REVIEW_CHARS       — max diff chars for review             (#76)
#   MAX_SUMMARY_CHARS      — max diff chars for summary            (#76)
#   MAX_RETRY              — retry attempts per model              (#77)
#   REVIEW_AB_MODE         — off|parity (A/B selector mode)
#   REVIEW_AB_MODELS       — comma-separated model IDs for A/B pool
#   Model IDs should match runtime catalog: https://models.github.ai/catalog/models
#   Review timeline logs are append-only per run (UTC timestamps)
#   and exported to the workflow summary for easier debugging.
#   Missing MODELS_PAT in dependabot/fork contexts now degrades gracefully
#   (skip + explicit reason) instead of failing the whole job.
#   Dependabot PRs that modify workflow files are inference-protected and skipped.
# =============================================================================
name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "templates/**"
      - ".github/workflows/**"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: read
  pull-requests: write

jobs:
  code-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    # Skip review for PRs labelled 'skip-ai-review' (#76)
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-ai-review') }}
    env:
      REVIEW_LONG_CONTEXT_MODEL: ${{ vars.REVIEW_LONG_CONTEXT_MODEL || '' }} # optional, tenant-specific
      REVIEW_MODEL: ${{ vars.REVIEW_MODEL || 'openai/gpt-4.1' }}
      REVIEW_FALLBACK_MODEL: ${{ vars.REVIEW_FALLBACK_MODEL || 'openai/gpt-4o' }}
      REVIEW_AB_MODE: ${{ vars.REVIEW_AB_MODE || 'off' }}
      REVIEW_AB_MODELS: ${{ vars.REVIEW_AB_MODELS || '' }}
      MAX_REVIEW_CHARS: "50000"
      MAX_REVIEW_TOKENS: "2000"
      CHUNK_SIZE_CHARS: "18000"
      CHUNK_OVERLAP_CHARS: "1200"
      MAX_RETRY: "5"
      MAX_RETRY_SLEEP: "60"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Preflight context and token policy
        id: preflight
        env:
          GH_MODELS_TOKEN: ${{ secrets.MODELS_PAT }}
        run: |
          set -euo pipefail
          ACTOR="${{ github.actor }}"
          BASE_REPO="${{ github.repository }}"
          HEAD_REPO="${{ github.event.pull_request.head.repo.full_name }}"
          CONTEXT="trusted"
          if [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            CONTEXT="untrusted"
          fi

          WORKFLOW_CHANGED="false"
          if git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} | grep -q '^\.github/workflows/'; then
            WORKFLOW_CHANGED="true"
          fi

          SKIP_REASON=""
          if [ -z "${GH_MODELS_TOKEN:-}" ]; then
            if [ "$CONTEXT" = "trusted" ] && [ "$ACTOR" != "dependabot[bot]" ]; then
              echo "::error::Missing MODELS_PAT secret in trusted context. Configure repository secret MODELS_PAT (models:read)."
              exit 1
            fi
            SKIP_REASON="missing_models_pat_${CONTEXT}_context"
          elif [ "$ACTOR" = "dependabot[bot]" ] && [ "$WORKFLOW_CHANGED" = "true" ]; then
            SKIP_REASON="dependabot_workflow_change_protection"
          fi

          if [ -n "$SKIP_REASON" ]; then
            echo "skip_inference=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=$SKIP_REASON" >> "$GITHUB_OUTPUT"
            echo "workflow_changed=$WORKFLOW_CHANGED" >> "$GITHUB_OUTPUT"
            echo "::notice::AI inference skipped ($SKIP_REASON)."
          else
            echo "skip_inference=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=" >> "$GITHUB_OUTPUT"
            echo "workflow_changed=$WORKFLOW_CHANGED" >> "$GITHUB_OUTPUT"
          fi

      - name: Get PR diff
        id: diff
        if: steps.preflight.outputs.skip_inference != 'true'
        run: |
          set -euo pipefail
          git diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} > diff_full.txt
          DIFF_SIZE=$(wc -c < diff_full.txt)
          echo "full_size=$DIFF_SIZE" >> "$GITHUB_OUTPUT"

          if [ "$DIFF_SIZE" -gt "$MAX_REVIEW_CHARS" ]; then
            echo "chunk_required=true" >> "$GITHUB_OUTPUT"
          else
            echo "chunk_required=false" >> "$GITHUB_OUTPUT"
          fi

          # no truncation; chunking later if required
          echo "truncated=false" >> "$GITHUB_OUTPUT"
          echo "truncated_at=0" >> "$GITHUB_OUTPUT"

          if [ ! -s diff_full.txt ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: AI Review via GitHub Models (with retry)
        if: steps.preflight.outputs.skip_inference != 'true' && steps.diff.outputs.skip != 'true'
        id: review
        env:
          GH_MODELS_TOKEN: ${{ secrets.MODELS_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # Mask token to prevent accidental log exposure
          if [ -n "${GH_MODELS_TOKEN:-}" ]; then
            echo "::add-mask::$GH_MODELS_TOKEN"
          fi

          SYSTEM_PROMPT="You are a senior code reviewer. Review this diff for: 1) Security vulnerabilities 2) Bugs 3) Best practice violations. Use markdown with severity: 🔴 Critical, 🟡 Warning, 🔵 Info. Be concise but thorough."
          CHUNK_REQUIRED=${{ steps.diff.outputs.chunk_required == 'true' && '1' || '0' }}
          TIMELINE_FILE="review_timeline.md"
          : > "$TIMELINE_FILE"

          timeline() {
            local MESSAGE="$1"
            printf '%s | %s\n' "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" "$MESSAGE" | tee -a "$TIMELINE_FILE" >&2
          }

          timeline "AI review started full_diff_chars=${{ steps.diff.outputs.full_size }} chunk_required=$CHUNK_REQUIRED"

          CATALOG_FILE="/tmp/models_catalog.json"
          CATALOG_OK=0
          if curl -fsS -H "Authorization: Bearer $GH_MODELS_TOKEN" https://models.github.ai/catalog/models > "$CATALOG_FILE"; then
            CATALOG_OK=1
            timeline "catalog_loaded count=$(jq 'length' "$CATALOG_FILE" 2>/dev/null || echo 0)"
          else
            timeline "catalog_unavailable continuing_without_precheck"
          fi

          model_in_catalog() {
            local MODEL="$1"
            if [ "$CATALOG_OK" -ne 1 ]; then
              return 0
            fi
            jq -e --arg model "$MODEL" '.[] | select(.id == $model)' "$CATALOG_FILE" >/dev/null 2>&1
          }

          if [ -n "$REVIEW_LONG_CONTEXT_MODEL" ] && ! model_in_catalog "$REVIEW_LONG_CONTEXT_MODEL"; then
            timeline "long_context_not_in_catalog model=$REVIEW_LONG_CONTEXT_MODEL"
            REVIEW_LONG_CONTEXT_MODEL=""
          fi
          if [ -n "$REVIEW_MODEL" ] && ! model_in_catalog "$REVIEW_MODEL"; then
            timeline "primary_not_in_catalog model=$REVIEW_MODEL"
          fi
          if [ -n "$REVIEW_FALLBACK_MODEL" ] && ! model_in_catalog "$REVIEW_FALLBACK_MODEL"; then
            timeline "fallback_not_in_catalog model=$REVIEW_FALLBACK_MODEL"
          fi

          # Optional A/B selector: choose long-context model from REVIEW_AB_MODELS by PR parity.
          if [ "${REVIEW_AB_MODE:-off}" != "off" ] && [ -n "${REVIEW_AB_MODELS:-}" ]; then
            mapfile -t AB_MODELS_RAW < <(echo "$REVIEW_AB_MODELS" | tr ',' '\n' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' | sed '/^$/d')
            AB_MODELS=()
            for MODEL in "${AB_MODELS_RAW[@]}"; do
              if model_in_catalog "$MODEL"; then
                AB_MODELS+=("$MODEL")
              else
                timeline "ab_model_not_in_catalog model=$MODEL"
              fi
            done

            if [ "${#AB_MODELS[@]}" -gt 0 ]; then
              if [ "$REVIEW_AB_MODE" = "parity" ]; then
                INDEX=$((PR_NUMBER % ${#AB_MODELS[@]}))
                REVIEW_LONG_CONTEXT_MODEL="${AB_MODELS[$INDEX]}"
                timeline "ab_selected mode=parity pr=$PR_NUMBER index=$INDEX model=$REVIEW_LONG_CONTEXT_MODEL pool=${#AB_MODELS[@]}"
              else
                timeline "ab_unknown_mode mode=$REVIEW_AB_MODE (supported: off, parity)"
              fi
            else
              timeline "ab_no_available_models mode=$REVIEW_AB_MODE"
            fi
          fi

          call_model() {
            local MODEL="$1" CONTENT="$2" PURPOSE="$3" CHUNK_ID="$4"
            local HEADERS_FILE="/tmp/headers-$CHUNK_ID.txt"
            local INPUT_CHARS=${#CONTENT}
            timeline "request purpose=$PURPOSE chunk=$CHUNK_ID model=$MODEL input_chars=$INPUT_CHARS"

            RESPONSE=$(curl -s -D "$HEADERS_FILE" -w "\n%{http_code}" -X POST \
              "https://models.github.ai/inference/chat/completions" \
              -H "Authorization: Bearer $GH_MODELS_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg system "$SYSTEM_PROMPT" \
                --arg diff "$CONTENT" \
                --arg model "$MODEL" \
                --argjson max_tokens "$MAX_REVIEW_TOKENS" \
                '{
                  model: $model,
                  messages: [
                    {role: "system", content: $system},
                    {role: "user", content: ("Review this pull request diff:\n\n" + $diff)}
                  ],
                  max_tokens: $max_tokens,
                  temperature: 0.2
                }')")

            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | sed '$d')
            RETRY_AFTER_HINT=$(echo "$BODY" | jq -r '.retry_after // empty' 2>/dev/null || true)
            if [ -n "$RETRY_AFTER_HINT" ]; then
              timeline "response purpose=$PURPOSE chunk=$CHUNK_ID model=$MODEL http=$HTTP_CODE retry_after=$RETRY_AFTER_HINT"
            else
              timeline "response purpose=$PURPOSE chunk=$CHUNK_ID model=$MODEL http=$HTTP_CODE"
            fi

            # Log rate-limit headers when present (free tier variability)
            if [ -f "$HEADERS_FILE" ]; then
              RATE_HEADERS=$(grep -iE 'x-ratelimit|retry-after' "$HEADERS_FILE" | tr -d '\r' || true)
              if [ -n "$RATE_HEADERS" ]; then
                while IFS= read -r HEADER_LINE; do
                  timeline "header purpose=$PURPOSE chunk=$CHUNK_ID model=$MODEL $HEADER_LINE"
                done <<< "$RATE_HEADERS"
              fi
            fi
          }

          review_with_chain() {
            local CONTENT="$1" PURPOSE="$2" CHUNK_ID="$3"
            local CANDIDATES=()
            if [ -n "$REVIEW_LONG_CONTEXT_MODEL" ]; then
              CANDIDATES+=("$REVIEW_LONG_CONTEXT_MODEL")
            fi
            CANDIDATES+=("$REVIEW_MODEL" "$REVIEW_FALLBACK_MODEL")

            local MODELS=()
            local CANDIDATE
            local EXISTING
            local DUPLICATE
            for CANDIDATE in "${CANDIDATES[@]}"; do
              [ -z "$CANDIDATE" ] && continue
              DUPLICATE=0
              for EXISTING in "${MODELS[@]}"; do
                if [ "$EXISTING" = "$CANDIDATE" ]; then
                  DUPLICATE=1
                  break
                fi
              done
              if [ "$DUPLICATE" -eq 0 ]; then
                MODELS+=("$CANDIDATE")
              fi
            done

            if [ "${#MODELS[@]}" -eq 0 ]; then
              timeline "no_models_configured purpose=$PURPOSE chunk=$CHUNK_ID"
              return 1
            fi

            for MODEL in "${MODELS[@]}"; do
              timeline "trying_model purpose=$PURPOSE chunk=$CHUNK_ID model=$MODEL"
              ATTEMPT=0
              while [ "$ATTEMPT" -lt "$MAX_RETRY" ]; do
                ATTEMPT=$((ATTEMPT + 1))
                timeline "attempt purpose=$PURPOSE chunk=$CHUNK_ID model=$MODEL value=$ATTEMPT/$MAX_RETRY"
                call_model "$MODEL" "$CONTENT" "$PURPOSE" "$CHUNK_ID"

                if [ "$HTTP_CODE" = "200" ]; then
                  USED_MODEL="$MODEL"
                  echo "$BODY" | jq -r '.choices[0].message.content' > "review_$CHUNK_ID.md"
                  TOKENS=$(echo "$BODY" | jq '.usage.total_tokens // 0')
                  echo "$TOKENS" > "tokens_$CHUNK_ID.txt"
                  timeline "success purpose=$PURPOSE chunk=$CHUNK_ID model=$MODEL tokens=$TOKENS"
                  return 0
                fi

                if echo "$BODY" | jq -e '.error.code == "tokens_limit_reached"' >/dev/null 2>&1 || [ "$HTTP_CODE" = "413" ]; then
                  timeline "tokens_limit purpose=$PURPOSE chunk=$CHUNK_ID model=$MODEL http=$HTTP_CODE"
                  echo "::warning::Received tokens_limit_reached/413 from $MODEL; will fallback to chunking"
                  return 413
                fi

                if [ "$HTTP_CODE" = "400" ] || [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "403" ] || [ "$HTTP_CODE" = "404" ]; then
                  ERROR_CODE=$(echo "$BODY" | jq -r '.error.code // "unknown"' 2>/dev/null || echo "unknown")
                  ERROR_MSG=$(echo "$BODY" | jq -r '.error.message // empty' 2>/dev/null | tr '\n' ' ' | cut -c1-180)
                  timeline "non_retryable purpose=$PURPOSE chunk=$CHUNK_ID model=$MODEL http=$HTTP_CODE error_code=$ERROR_CODE error_msg=$ERROR_MSG"
                  echo "::warning::Non-retryable HTTP $HTTP_CODE from $MODEL (error: $ERROR_CODE). Trying next model..."
                  break
                fi

                timeline "attempt_failed purpose=$PURPOSE chunk=$CHUNK_ID model=$MODEL http=$HTTP_CODE"
                echo "::warning::Attempt $ATTEMPT failed (HTTP $HTTP_CODE) with $MODEL"
                if [ "$ATTEMPT" -lt "$MAX_RETRY" ]; then
                  RETRY_AFTER=$(echo "$BODY" | jq -r '.retry_after // empty' 2>/dev/null || true)
                  if [ -n "$RETRY_AFTER" ]; then
                    SLEEP="$RETRY_AFTER"
                  else
                    RAW_SLEEP=$((2 ** ATTEMPT))
                    SLEEP=$(( RAW_SLEEP < MAX_RETRY_SLEEP ? RAW_SLEEP : MAX_RETRY_SLEEP ))
                  fi
                  JITTER=$((RANDOM % 5))
                  SLEEP=$((SLEEP + JITTER))
                  timeline "backoff purpose=$PURPOSE chunk=$CHUNK_ID model=$MODEL sleep=${SLEEP}s"
                  echo "Retrying in ${SLEEP}s..."
                  sleep "$SLEEP"
                fi
              done
              timeline "model_exhausted purpose=$PURPOSE chunk=$CHUNK_ID model=$MODEL last_http=$HTTP_CODE"
              echo "::warning::All $MAX_RETRY attempts exhausted for $MODEL (HTTP $HTTP_CODE); trying next model..."
            done
            return 1
          }

          # 1) Try full diff if within soft limit
          if [ "$CHUNK_REQUIRED" -eq 0 ]; then
            DIFF_CONTENT=$(cat diff_full.txt)
            if review_with_chain "$DIFF_CONTENT" "full-diff" "full"; then
              echo "### Full diff review" > review.md
              cat review_full.md >> review.md
              echo >> review.md
              echo "tokens=$(cat tokens_full.txt)" >> "$GITHUB_OUTPUT"
              echo "model=$USED_MODEL" >> "$GITHUB_OUTPUT"
              echo "chunked=false" >> "$GITHUB_OUTPUT"
              timeline "full_diff_completed model=$USED_MODEL tokens=$(cat tokens_full.txt)"
              exit 0
            fi
            timeline "full_diff_fallback_to_chunking"
            echo "::warning::Full diff path failed or hit 413; switching to chunked review"
          else
            timeline "chunking_enabled_due_to_size full_diff_chars=${{ steps.diff.outputs.full_size }} max_review_chars=$MAX_REVIEW_CHARS"
            echo "Diff size exceeds MAX_REVIEW_CHARS; using chunked review"
          fi

          # 2) Chunked path (overlapping chunks for coherence)
          STEP=$((CHUNK_SIZE_CHARS - CHUNK_OVERLAP_CHARS))
          if [ "$STEP" -le 0 ]; then
            echo "::error::Invalid chunk config: CHUNK_SIZE_CHARS must be greater than CHUNK_OVERLAP_CHARS (size=$CHUNK_SIZE_CHARS overlap=$CHUNK_OVERLAP_CHARS)"
            exit 1
          fi

          DIFF_LEN=$(wc -c < diff_full.txt)
          timeline "chunking_config diff_len=$DIFF_LEN chunk_size=$CHUNK_SIZE_CHARS chunk_overlap=$CHUNK_OVERLAP_CHARS step=$STEP"
          CHUNK_COUNT=0
          OFFSET=0
          while [ "$OFFSET" -lt "$DIFF_LEN" ]; do
            CHUNK_COUNT=$((CHUNK_COUNT + 1))
            FILE=$(printf "diff_chunk_%02d.txt" "$CHUNK_COUNT")
            dd if=diff_full.txt of="$FILE" bs=1 skip="$OFFSET" count="$CHUNK_SIZE_CHARS" status=none
            timeline "chunk_created id=$(printf '%02d' "$CHUNK_COUNT") offset=$OFFSET"
            OFFSET=$((OFFSET + STEP))
          done

          if [ "$CHUNK_COUNT" -le 0 ]; then
            echo "::error::Chunking failed"
            exit 1
          fi

          timeline "chunking_started chunk_count=$CHUNK_COUNT"
          TOTAL_TOKENS=0
          > review.md
          for FILE in diff_chunk_*.txt; do
            CID=$(echo "$FILE" | sed 's/[^0-9]//g')
            CONTENT=$(cat "$FILE")
            if ! review_with_chain "$CONTENT" "chunk-$CID" "$CID"; then
              echo "::error::Chunk $CID failed"; exit 1
            fi
            echo "### Chunk $CID" >> review.md
            cat "review_${CID}.md" >> review.md
            echo >> review.md
            TOK=$(cat "tokens_${CID}.txt")
            TOTAL_TOKENS=$((TOTAL_TOKENS + TOK))
            timeline "chunk_completed id=$CID tokens=$TOK total_tokens=$TOTAL_TOKENS"
          done

          echo "tokens=$TOTAL_TOKENS" >> "$GITHUB_OUTPUT"
          echo "model=$USED_MODEL" >> "$GITHUB_OUTPUT"
          echo "chunked=true" >> "$GITHUB_OUTPUT"
          timeline "chunked_review_completed model=$USED_MODEL total_tokens=$TOTAL_TOKENS"

      - name: Append AI review timeline to workflow summary
        if: steps.preflight.outputs.skip_inference != 'true' && steps.diff.outputs.skip != 'true'
        run: |
          {
            echo "## AI Review Timeline"
            echo
            echo '```text'
            cat review_timeline.md
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post review comment
        if: steps.preflight.outputs.skip_inference != 'true' && steps.diff.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.md', 'utf8');
            const truncated = '${{ steps.diff.outputs.truncated }}' === 'true';
            const truncatedAt = '${{ steps.diff.outputs.truncated_at }}';
            const tokens = '${{ steps.review.outputs.tokens }}';
            const model = '${{ steps.review.outputs.model }}';

            let footer = `\n\n---\n*🤖 AI Review · ${model} · ${tokens} tokens · GitHub Models free tier · 0 premium requests*`;
            if (truncated) {
              footer += `\n\n> ⚠️ **Diff truncated** to ${truncatedAt} chars (full diff: ${{ steps.diff.outputs.full_size }} chars). Changes beyond this point were **not reviewed**. Add label \`skip-ai-review\` to suppress, or split the PR.`;
            }

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `## 🔍 AI Code Review\n\n${review}${footer}`
            });

      - name: Skip notice
        if: steps.preflight.outputs.skip_inference != 'true' && steps.diff.outputs.skip == 'true'
        run: echo "::notice::No diff detected — skipping AI review"

      - name: Skip inference notice
        if: steps.preflight.outputs.skip_inference == 'true'
        run: |
          TIMELINE_FILE="review_timeline.md"
          printf '%s | %s\n' "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" \
            "inference_skipped reason=${{ steps.preflight.outputs.skip_reason }} actor=${{ github.actor }} workflow_changed=${{ steps.preflight.outputs.workflow_changed }}" > "$TIMELINE_FILE"
          {
            echo "## AI Review Timeline"
            echo
            echo '```text'
            cat "$TIMELINE_FILE"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice::AI review skipped: ${{ steps.preflight.outputs.skip_reason }}"

  pr-summary:
    name: AI PR Summary
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-ai-review') }}
    env:
      SUMMARY_MODEL: "openai/gpt-4.1-mini"
      SUMMARY_FALLBACK_MODEL: "openai/gpt-4o-mini"
      SUMMARY_FALLBACK_MODEL_2: "meta/llama-3.3-70b-instruct"
      MAX_SUMMARY_CHARS: "12000"
      MAX_SUMMARY_TOKENS: "1000"
      MAX_RETRY: "5"
      MAX_RETRY_SLEEP: "60"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Preflight context and token policy
        id: preflight
        env:
          GH_MODELS_TOKEN: ${{ secrets.MODELS_PAT }}
        run: |
          set -euo pipefail
          ACTOR="${{ github.actor }}"
          BASE_REPO="${{ github.repository }}"
          HEAD_REPO="${{ github.event.pull_request.head.repo.full_name }}"
          CONTEXT="trusted"
          if [ "$HEAD_REPO" != "$BASE_REPO" ]; then
            CONTEXT="untrusted"
          fi

          WORKFLOW_CHANGED="false"
          if git diff --name-only ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} | grep -q '^\.github/workflows/'; then
            WORKFLOW_CHANGED="true"
          fi

          SKIP_REASON=""
          if [ -z "${GH_MODELS_TOKEN:-}" ]; then
            if [ "$CONTEXT" = "trusted" ] && [ "$ACTOR" != "dependabot[bot]" ]; then
              echo "::error::Missing MODELS_PAT secret in trusted context. Configure repository secret MODELS_PAT (models:read)."
              exit 1
            fi
            SKIP_REASON="missing_models_pat_${CONTEXT}_context"
          elif [ "$ACTOR" = "dependabot[bot]" ] && [ "$WORKFLOW_CHANGED" = "true" ]; then
            SKIP_REASON="dependabot_workflow_change_protection"
          fi

          if [ -n "$SKIP_REASON" ]; then
            echo "skip_inference=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=$SKIP_REASON" >> "$GITHUB_OUTPUT"
            echo "workflow_changed=$WORKFLOW_CHANGED" >> "$GITHUB_OUTPUT"
            echo "::notice::AI summary inference skipped ($SKIP_REASON)."
          else
            echo "skip_inference=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=" >> "$GITHUB_OUTPUT"
            echo "workflow_changed=$WORKFLOW_CHANGED" >> "$GITHUB_OUTPUT"
          fi

      - name: Get PR info
        id: info
        if: steps.preflight.outputs.skip_inference != 'true'
        run: |
          set -euo pipefail
          git diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} > diff_full.txt
          head -c "$MAX_SUMMARY_CHARS" diff_full.txt > diff.txt
          git diff --name-status ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} > files.txt

          if [ ! -s diff.txt ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate summary (with retry)
        if: steps.preflight.outputs.skip_inference != 'true' && steps.info.outputs.skip != 'true'
        id: summary
        env:
          GH_MODELS_TOKEN: ${{ secrets.MODELS_PAT }}
        run: |
          set -euo pipefail
          # Mask token to prevent accidental log exposure
          if [ -n "${GH_MODELS_TOKEN:-}" ]; then
            echo "::add-mask::$GH_MODELS_TOKEN"
          fi

          SYSTEM="Generate a concise PR summary in markdown. Include: ## Summary (1-2 sentences), ## Changes (list key changes), ## Impact (what's affected). Be concise."
          FILES=$(cat files.txt)
          DIFF=$(cat diff.txt)

          # Model fallback chain: primary → fallback → high-rate-limit fallback (#77)
          MODELS=("$SUMMARY_MODEL" "$SUMMARY_FALLBACK_MODEL" "$SUMMARY_FALLBACK_MODEL_2")
          HTTP_CODE=""
          BODY=""
          USED_MODEL=""

          for MODEL in "${MODELS[@]}"; do
            echo "Trying model: $MODEL"
            ATTEMPT=0
            while [ "$ATTEMPT" -lt "$MAX_RETRY" ]; do
              ATTEMPT=$((ATTEMPT + 1))
              echo "Attempt $ATTEMPT/$MAX_RETRY with $MODEL..."

              RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
                "https://models.github.ai/inference/chat/completions" \
                -H "Authorization: Bearer $GH_MODELS_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$(jq -n \
                  --arg system "$SYSTEM" \
                  --arg files "$FILES" \
                  --arg diff "$DIFF" \
                  --arg model "$MODEL" \
                  --argjson max_tokens "$MAX_SUMMARY_TOKENS" \
                  '{
                    model: $model,
                    messages: [
                      {role: "system", content: $system},
                      {role: "user", content: ("Files changed:\n" + $files + "\n\nDiff:\n" + $diff)}
                    ],
                    max_tokens: $max_tokens,
                    temperature: 0.3
                  }')")

              HTTP_CODE=$(echo "$RESPONSE" | tail -1)
              BODY=$(echo "$RESPONSE" | sed '$d')

              if [ "$HTTP_CODE" = "200" ]; then
                USED_MODEL="$MODEL"
                break 2
              fi

              echo "::warning::Attempt $ATTEMPT failed (HTTP $HTTP_CODE) with $MODEL"
              if [ "$ATTEMPT" -lt "$MAX_RETRY" ]; then
                RETRY_AFTER=$(echo "$BODY" | jq -r '.retry_after // empty' 2>/dev/null || true)
                if [ -n "$RETRY_AFTER" ]; then
                  SLEEP="$RETRY_AFTER"
                else
                  RAW_SLEEP=$((2 ** ATTEMPT))
                  SLEEP=$(( RAW_SLEEP < MAX_RETRY_SLEEP ? RAW_SLEEP : MAX_RETRY_SLEEP ))
                fi
                JITTER=$((RANDOM % 5))
                SLEEP=$((SLEEP + JITTER))
                echo "Retrying in ${SLEEP}s..."
                sleep "$SLEEP"
              fi
            done

            if [ "$HTTP_CODE" != "200" ]; then
              echo "::warning::All $MAX_RETRY attempts exhausted for $MODEL (HTTP $HTTP_CODE); trying next model..."
            fi
          done

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::All models failed after exhausting retries. Last HTTP $HTTP_CODE"
            echo "$BODY" | jq .error 2>/dev/null || true
            exit 1
          fi

          echo "$BODY" | jq -r '.choices[0].message.content' > summary.md
          echo "model=$USED_MODEL" >> "$GITHUB_OUTPUT"

      - name: Post summary
        if: steps.preflight.outputs.skip_inference != 'true' && steps.info.outputs.skip != 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('summary.md', 'utf8');
            const model = '${{ steps.summary.outputs.model }}';
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `## 📝 AI PR Summary\n\n${summary}\n\n---\n*🤖 Auto-generated · ${model} · GitHub Models free tier · 0 premium requests*`
            });

      - name: Skip summary notice (no diff)
        if: steps.preflight.outputs.skip_inference != 'true' && steps.info.outputs.skip == 'true'
        run: echo "::notice::No diff detected — skipping AI PR summary"

      - name: Skip summary inference notice
        if: steps.preflight.outputs.skip_inference == 'true'
        run: |
          {
            echo "## AI PR Summary"
            echo
            echo "Model inference skipped: \`${{ steps.preflight.outputs.skip_reason }}\`"
            echo "Actor: \`${{ github.actor }}\`, workflow_changed: \`${{ steps.preflight.outputs.workflow_changed }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::notice::AI PR summary skipped: ${{ steps.preflight.outputs.skip_reason }}"
