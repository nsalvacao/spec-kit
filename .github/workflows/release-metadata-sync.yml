name: Release Metadata Sync

on:
  release:
    types: [published]
  workflow_run:
    workflows: ["Create Release"]
    types: [completed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to sync (example: vMAJOR.MINOR.PATCH). Defaults to latest published release."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-metadata-sync-${{ github.event_name }}-rel-${{ github.event.release.tag_name }}-inp-${{ github.event.inputs.release_tag }}-wr-${{ github.event.workflow_run.id }}-ref-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  sync-release-metadata:
    if: >-
      ${{
        !(github.event_name == 'workflow_run' && github.event.workflow_run.conclusion != 'success')
        && !(github.event_name == 'release' && github.event.release.author.login == 'github-actions[bot]')
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve default branch
        id: default_branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch="${{ github.event.repository.default_branch }}"
          if [[ -z "$branch" || "$branch" == "null" ]]; then
            branch="$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.default_branch')"
          fi
          if [[ -z "$branch" || "$branch" == "null" ]]; then
            branch="main"
          fi
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.default_branch.outputs.branch }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check pyyaml

      - name: Resolve release tag
        id: release_tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          source=""
          tag="${{ github.event.release.tag_name }}"
          if [[ -n "$tag" ]]; then
            source="release_event"
          fi
          if [[ -z "$tag" ]]; then
            tag="${{ github.event.inputs.release_tag }}"
            if [[ -n "$tag" ]]; then
              source="workflow_dispatch_input"
            fi
          fi
          if [[ -z "$tag" ]]; then
            if ! tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name')"; then
              echo "::error::Failed to fetch latest release via API. Provide 'release_tag' when running workflow_dispatch." >&2
              exit 1
            fi
            source="latest_release_api_fallback"
          fi
          if [[ -z "$tag" || "$tag" == "null" ]]; then
            echo "::error::Unable to resolve release tag. No published release found; provide 'release_tag' for workflow_dispatch." >&2
            exit 1
          fi
          python - "$tag" <<'PY'
          import re
          import sys

          import yaml

          tag = sys.argv[1]
          try:
              with open(".github/version-map.yml", encoding="utf-8") as f:
                  payload = yaml.safe_load(f) or {}
          except FileNotFoundError:
              print("::error::Missing .github/version-map.yml required for tag validation.", file=sys.stderr)
              sys.exit(1)
          except yaml.YAMLError as exc:
              print(f"::error::Invalid YAML in .github/version-map.yml: {exc}", file=sys.stderr)
              sys.exit(1)

          pattern = str((payload.get("tagging") or {}).get("tag_pattern", "")).strip()
          if not pattern:
              print("::error::Missing tagging.tag_pattern in .github/version-map.yml.", file=sys.stderr)
              sys.exit(1)

          if re.fullmatch(pattern, tag) is None:
              print(
                  f"::error::Resolved tag '{tag}' does not match tagging.tag_pattern '{pattern}'.",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "source=$source" >> "$GITHUB_OUTPUT"

          {
            echo "### Release Tag Resolution"
            echo "- tag: \`$tag\`"
            echo "- source: \`$source\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Synchronize metadata files
        id: sync
        run: |
          python scripts/python/version-orchestrator.py sync \
            --repo-root "$GITHUB_WORKSPACE" \
            --map .github/version-map.yml \
            --release-tag "${{ steps.release_tag.outputs.tag }}" \
            --release-date "$(date -u +%Y-%m-%d)" \
            --json > sync-result.json

          cat sync-result.json
          changed="$(python -c "import json; p=json.load(open('sync-result.json', encoding='utf-8')); print('true' if p.get('changed') else 'false')")"
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

          {
            echo "## Release Metadata Sync"
            echo ""
            echo '```json'
            cat sync-result.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Hydrate changelog section from release notes
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.release_tag.outputs.tag }}"
          body="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" --jq '.body // ""' 2>/dev/null || true)"
          printf '%s\n' "$body" > release-body.md

          python scripts/python/changelog-hydrator.py \
            --changelog CHANGELOG.md \
            --version "${tag#v}" \
            --release-body-file release-body.md \
            --json > changelog-hydrator-result.json

          cat changelog-hydrator-result.json
          {
            echo "### Changelog Hydration"
            echo ""
            echo '```json'
            cat changelog-hydrator-result.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce sync allowlist
        if: steps.sync.outputs.changed == 'true'
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys

          payload = json.load(open("sync-result.json", encoding="utf-8"))
          allowlist = set(payload.get("allowlist", []))
          reported = set(payload.get("changed_files", []))
          diff = set(
              line.strip()
              for line in subprocess.check_output(["git", "diff", "--name-only"], text=True).splitlines()
              if line.strip()
          )

          if not diff:
              print("Expected metadata changes but no git diff detected.", file=sys.stderr)
              sys.exit(1)

          unexpected = sorted(diff - allowlist)
          missing_in_report = sorted(diff - reported)
          stale_reported = sorted(reported - diff)

          if unexpected:
              print(
                  "Unexpected changed files outside manifest allowlist: "
                  + ", ".join(unexpected),
                  file=sys.stderr,
              )
              sys.exit(1)
          if missing_in_report or stale_reported:
              print(
                  "Mismatch between reported changed_files and git diff. "
                  f"missing_in_report={missing_in_report}, stale_reported={stale_reported}",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY

      - name: Commit and push sync branch
        if: steps.sync.outputs.changed == 'true'
        id: push_branch
        env:
          TAG: ${{ steps.release_tag.outputs.tag }}
        run: |
          sanitized="${TAG#v}"
          branch="automation/release-metadata-${sanitized}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$branch"
          mapfile -t changed_files < <(python - <<'PY'
          import json
          payload = json.load(open("sync-result.json", encoding="utf-8"))
          for path in payload.get("changed_files", []):
              if path:
                  print(path)
          PY
          )
          if [[ "${#changed_files[@]}" -eq 0 ]]; then
            echo "Expected changed files from sync-result.json, found none." >&2
            exit 1
          fi
          git add -- "${changed_files[@]}"
          git commit -m "chore(release): sync metadata for ${TAG}"
          git push --force-with-lease origin "$branch"

          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Create or update metadata sync PR
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release_tag.outputs.tag }}
          BRANCH: ${{ steps.push_branch.outputs.branch }}
        run: |
          title="chore(release): sync metadata for ${TAG}"
          body=$(cat <<EOF
          Automated release metadata synchronization for \`${TAG}\`.

          Updated files:
          - \`pyproject.toml\`
          - \`uv.lock\`
          - \`CHANGELOG.md\`

          This PR is generated by \`.github/workflows/release-metadata-sync.yml\`.
          EOF
          )

          pr_number="$(gh pr list --head "$BRANCH" --base "${{ steps.default_branch.outputs.branch }}" --state open --json number --jq '.[0].number // ""')"
          if [[ -n "$pr_number" ]]; then
            gh pr edit "$pr_number" --title "$title" --body "$body"
          else
            gh pr create --base "${{ steps.default_branch.outputs.branch }}" --head "$BRANCH" --title "$title" --body "$body"
          fi

      - name: No drift detected
        if: steps.sync.outputs.changed != 'true'
        run: echo "Release metadata already synchronized. Nothing to do."
