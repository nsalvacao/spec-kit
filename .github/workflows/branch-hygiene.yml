name: Branch Hygiene

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply deletions (true) or dry-run (false)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "29 4 * * *"

permissions:
  contents: write
  pull-requests: read

jobs:
  branch-hygiene:
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --disable-pip-version-check pyyaml

      - name: Fetch all remote branches
        run: git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune

      - name: Run branch hygiene
        id: hygiene
        run: |
          apply="false"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            apply="true"
          fi
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            apply="${{ github.event.inputs.apply }}"
          fi
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            apply="true"
          fi

          cmd=(python scripts/python/branch-hygiene.py run \
            --repo-root "$GITHUB_WORKSPACE" \
            --policy .github/release-version-policy.yml \
            --remote origin \
            --json)
          if [[ "$apply" == "true" ]]; then
            cmd+=(--apply)
          fi

          "${cmd[@]}" > branch-hygiene.json
          cat branch-hygiene.json

          {
            echo "## Branch Hygiene"
            echo ""
            echo "- Apply mode: \`$apply\`"
            echo ""
            echo '```json'
            cat branch-hygiene.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
