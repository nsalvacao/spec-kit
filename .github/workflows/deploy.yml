name: Deploy to VM

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (for example v0.0.52)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-vm
  cancel-in-progress: true

jobs:
  deploy:
    name: Install specify-cli on GCP VM
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}"
          TAG="${TAG#"${TAG%%[![:space:]]*}"}"
          TAG="${TAG%"${TAG##*[![:space:]]}"}"

          if [[ -z "$TAG" ]]; then
            echo "ERROR: could not resolve release tag (set workflow_dispatch input 'tag')." >&2
            exit 1
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][A-Za-z0-9.]+)?$ ]]; then
            echo "ERROR: invalid tag format '$TAG'. Expected vMAJOR.MINOR.PATCH." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG" >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare SSH key
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${DEPLOY_SSH_KEY:-}" ]]; then
            echo "ERROR: missing required secret DEPLOY_SSH_KEY." >&2
            echo "Configure it in: Settings -> Secrets and variables -> Actions -> Secrets." >&2
            exit 1
          fi

          if ! grep -Eq '-----BEGIN (OPENSSH|RSA|EC|DSA) PRIVATE KEY-----' <<< "$DEPLOY_SSH_KEY"; then
            echo "ERROR: DEPLOY_SSH_KEY does not appear to be a valid private key payload." >&2
            exit 1
          fi

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$HOME/.ssh/deploy_vm_ed25519"
          chmod 600 "$HOME/.ssh/deploy_vm_ed25519"

          if ! ssh-keygen -y -f "$HOME/.ssh/deploy_vm_ed25519" >/dev/null 2>&1; then
            echo "ERROR: DEPLOY_SSH_KEY could not be parsed (encrypted or malformed key)." >&2
            exit 1
          fi

      - name: Verify VM host key fingerprint
        shell: bash
        env:
          DEPLOY_VM_HOST: ${{ secrets.DEPLOY_VM_HOST }}
          DEPLOY_VM_HOST_FINGERPRINT: ${{ vars.DEPLOY_VM_HOST_FINGERPRINT }}
        run: |
          set -euo pipefail

          if [[ -z "${DEPLOY_VM_HOST_FINGERPRINT:-}" ]]; then
            echo "ERROR: repository variable DEPLOY_VM_HOST_FINGERPRINT is required." >&2
            echo "Set it in: Settings -> Secrets and variables -> Actions -> Variables." >&2
            echo "Suggested value (ED25519): ssh-keyscan -T 10 -p 22 -t ed25519 -H <DEPLOY_VM_HOST> | ssh-keygen -lf - -E sha256 | awk '{print \$2}'" >&2
            exit 1
          fi

          ssh-keyscan -T 10 -p 22 -t ed25519 -H "$DEPLOY_VM_HOST" > "$HOME/.ssh/known_hosts.candidate"
          if [[ ! -s "$HOME/.ssh/known_hosts.candidate" ]]; then
            echo "ERROR: failed to capture VM host key via ssh-keyscan." >&2
            exit 1
          fi

          OBSERVED_FINGERPRINTS="$(
            ssh-keygen -lf "$HOME/.ssh/known_hosts.candidate" -E sha256 \
              | awk '{print $2}' \
              | sort -u
          )"
          echo "Observed host fingerprints:"
          echo "$OBSERVED_FINGERPRINTS"

          if ! grep -Fxq "$DEPLOY_VM_HOST_FINGERPRINT" <<< "$OBSERVED_FINGERPRINTS"; then
            echo "ERROR: VM host fingerprint mismatch." >&2
            echo "Expected: $DEPLOY_VM_HOST_FINGERPRINT" >&2
            exit 1
          fi

          mv "$HOME/.ssh/known_hosts.candidate" "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Deploy via native SSH
        shell: bash
        env:
          DEPLOY_VM_HOST: ${{ secrets.DEPLOY_VM_HOST }}
          DEPLOY_VM_USER: ${{ secrets.DEPLOY_VM_USER }}
          DEPLOY_TAG: ${{ steps.tag.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [[ -z "${DEPLOY_VM_HOST:-}" || -z "${DEPLOY_VM_USER:-}" ]]; then
            echo "ERROR: missing required secrets DEPLOY_VM_HOST and/or DEPLOY_VM_USER." >&2
            exit 1
          fi

          ssh \
            -i "$HOME/.ssh/deploy_vm_ed25519" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -o ConnectTimeout=10 \
            "${DEPLOY_VM_USER}@${DEPLOY_VM_HOST}" \
            "set -eu; \
            test -x \"\$HOME/.local/bin/uv\"; \
            \"\$HOME/.local/bin/uv\" tool install --reinstall \"git+https://github.com/${REPOSITORY}@${DEPLOY_TAG}\"; \
            test -x \"\$HOME/.local/bin/specify\"; \
            \"\$HOME/.local/bin/specify\" --help > /tmp/specify-help.txt; \
            head -n 20 /tmp/specify-help.txt"

      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo "## Deploy to VM"
            echo ""
            echo "- Repository: \`${{ github.repository }}\`"
            echo "- Tag: \`${{ steps.tag.outputs.tag }}\`"
            echo "- Target: \`${{ secrets.DEPLOY_VM_USER }}@${{ secrets.DEPLOY_VM_HOST }}\`"
            echo "- Status: completed"
          } >> "$GITHUB_STEP_SUMMARY"
