name: Deploy to VM

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (for example v0.0.52)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-vm
  cancel-in-progress: true

jobs:
  deploy:
    name: Install specify-cli on GCP VM
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}"
          TAG="${TAG#"${TAG%%[![:space:]]*}"}"
          TAG="${TAG%"${TAG##*[![:space:]]}"}"

          if [[ -z "$TAG" ]]; then
            echo "ERROR: could not resolve release tag (set workflow_dispatch input 'tag')." >&2
            exit 1
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?(\+[A-Za-z0-9.]+)?$ ]]; then
            echo "ERROR: invalid tag format '$TAG'. Expected vMAJOR.MINOR.PATCH." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG" >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare SSH key
        id: prepare_ssh_key
        shell: bash
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${DEPLOY_SSH_KEY:-}" ]]; then
            echo "ERROR: missing required secret DEPLOY_SSH_KEY." >&2
            echo "Configure it in: Settings -> Secrets and variables -> Actions -> Secrets." >&2
            exit 1
          fi

          if ! grep -Eq '-----BEGIN (OPENSSH|RSA|EC|DSA) PRIVATE KEY-----' <<< "$DEPLOY_SSH_KEY"; then
            echo "ERROR: DEPLOY_SSH_KEY does not appear to be a valid private key payload." >&2
            exit 1
          fi

          # Store key in runner temp; cleanup step removes the file after deploy.
          KEY_PATH="$(mktemp "$RUNNER_TEMP/deploy_vm_ed25519.XXXXXX")"
          cleanup_on_error() {
            rm -f "$KEY_PATH" || true
          }
          trap cleanup_on_error ERR
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          unset DEPLOY_SSH_KEY

          if ! ssh-keygen -y -f "$KEY_PATH" >/dev/null 2>&1; then
            echo "ERROR: DEPLOY_SSH_KEY could not be parsed (encrypted or malformed key)." >&2
            exit 1
          fi

          echo "key_path=$KEY_PATH" >> "$GITHUB_OUTPUT"
          trap - ERR

      - name: Verify VM host key fingerprint
        id: verify_host_key
        shell: bash
        env:
          DEPLOY_VM_HOST: ${{ secrets.DEPLOY_VM_HOST }}
          DEPLOY_VM_HOST_FINGERPRINT: ${{ vars.DEPLOY_VM_HOST_FINGERPRINT }}
          DEPLOY_VM_KNOWN_HOSTS: ${{ vars.DEPLOY_VM_KNOWN_HOSTS }}
          DEPLOY_VM_PORT: ${{ vars.DEPLOY_VM_PORT }}
        run: |
          set -euo pipefail

          DEPLOY_PORT="${DEPLOY_VM_PORT:-22}"
          if [[ ! "$DEPLOY_PORT" =~ ^[0-9]+$ ]]; then
            echo "ERROR: DEPLOY_VM_PORT must be numeric." >&2
            exit 1
          fi

          if [[ -z "${DEPLOY_VM_HOST_FINGERPRINT:-}" ]]; then
            echo "ERROR: repository variable DEPLOY_VM_HOST_FINGERPRINT is required." >&2
            echo "Set it in: Settings -> Secrets and variables -> Actions -> Variables." >&2
            echo "Suggested value (ED25519): ssh-keyscan -T 10 -p 22 -t ed25519 -H <DEPLOY_VM_HOST> | ssh-keygen -lf - -E sha256 | awk '{print \$2}'" >&2
            echo "You may provide multiple fingerprints separated by commas during key rotation windows." >&2
            exit 1
          fi

          if [[ -z "${DEPLOY_VM_KNOWN_HOSTS:-}" ]]; then
            echo "ERROR: repository variable DEPLOY_VM_KNOWN_HOSTS is required for host-key pinning." >&2
            echo "Set it in: Settings -> Secrets and variables -> Actions -> Variables." >&2
            echo "Suggested value: ssh-keyscan -T 10 -p ${DEPLOY_PORT} -t ed25519 <DEPLOY_VM_HOST> | sed '/^#/d' | head -n 1" >&2
            exit 1
          fi

          KNOWN_HOSTS_PATH="$(mktemp "$RUNNER_TEMP/deploy_known_hosts.XXXXXX")"
          printf '%s\n' "$DEPLOY_VM_KNOWN_HOSTS" > "$KNOWN_HOSTS_PATH"
          if [[ ! -s "$KNOWN_HOSTS_PATH" ]]; then
            echo "ERROR: DEPLOY_VM_KNOWN_HOSTS resolved to an empty value." >&2
            exit 1
          fi

          KNOWN_HOSTS_ENTRY_COUNT="$(grep -Evc '^[[:space:]]*($|#)' "$KNOWN_HOSTS_PATH" || true)"
          if [[ "$KNOWN_HOSTS_ENTRY_COUNT" -lt 1 ]]; then
            echo "ERROR: DEPLOY_VM_KNOWN_HOSTS must contain at least one non-comment host-key entry." >&2
            exit 1
          fi

          while IFS= read -r KNOWN_HOSTS_LINE; do
            [[ -z "$KNOWN_HOSTS_LINE" || "$KNOWN_HOSTS_LINE" =~ ^[[:space:]]*# ]] && continue

            KNOWN_HOST_FIELD="$(awk '{print $1}' <<< "$KNOWN_HOSTS_LINE")"
            KNOWN_KEY_TYPE="$(awk '{print $2}' <<< "$KNOWN_HOSTS_LINE")"
            KNOWN_FIELD_COUNT="$(awk '{print NF}' <<< "$KNOWN_HOSTS_LINE")"

            if [[ "$KNOWN_FIELD_COUNT" -lt 3 ]]; then
              echo "ERROR: DEPLOY_VM_KNOWN_HOSTS contains a malformed entry (expected: host keytype key)." >&2
              exit 1
            fi

            if [[ "$KNOWN_KEY_TYPE" != "ssh-ed25519" ]]; then
              echo "ERROR: DEPLOY_VM_KNOWN_HOSTS must use ssh-ed25519 key type." >&2
              exit 1
            fi

            if [[ "$KNOWN_HOST_FIELD" == "|1|"* ]]; then
              echo "ERROR: DEPLOY_VM_KNOWN_HOSTS must use non-hashed host entries for deterministic validation." >&2
              exit 1
            fi

            if [[ "$KNOWN_HOST_FIELD" != "$DEPLOY_VM_HOST" && "$KNOWN_HOST_FIELD" != "[$DEPLOY_VM_HOST]:$DEPLOY_PORT" ]]; then
              echo "ERROR: DEPLOY_VM_KNOWN_HOSTS host field does not match DEPLOY_VM_HOST/DEPLOY_VM_PORT." >&2
              exit 1
            fi
          done < "$KNOWN_HOSTS_PATH"

          EXPECTED_FINGERPRINTS="$(
            echo "$DEPLOY_VM_HOST_FINGERPRINT" \
              | tr ',;' '\n' \
              | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' \
              | sed '/^$/d' \
              | sort -u
          )"

          OBSERVED_FINGERPRINTS="$(
            ssh-keygen -lf "$KNOWN_HOSTS_PATH" -E sha256 \
              | awk '{print $2}' \
              | sed '/^$/d' \
              | sort -u
          )"
          if [[ -z "$OBSERVED_FINGERPRINTS" ]]; then
            echo "ERROR: could not derive host fingerprint(s) from DEPLOY_VM_KNOWN_HOSTS." >&2
            exit 1
          fi
          echo "Observed host fingerprints:"
          echo "$OBSERVED_FINGERPRINTS"

          UNEXPECTED_FINGERPRINTS="$(
            comm -23 \
              <(printf '%s\n' "$OBSERVED_FINGERPRINTS") \
              <(printf '%s\n' "$EXPECTED_FINGERPRINTS") \
              || true
          )"
          if [[ -n "$UNEXPECTED_FINGERPRINTS" ]]; then
            echo "ERROR: VM host fingerprint mismatch." >&2
            echo "Expected (allowed): $EXPECTED_FINGERPRINTS" >&2
            echo "Unexpected (observed): $UNEXPECTED_FINGERPRINTS" >&2
            exit 1
          fi

          chmod 600 "$KNOWN_HOSTS_PATH"
          echo "known_hosts_path=$KNOWN_HOSTS_PATH" >> "$GITHUB_OUTPUT"

      - name: Deploy via native SSH
        id: deploy_native
        shell: bash
        env:
          DEPLOY_VM_HOST: ${{ secrets.DEPLOY_VM_HOST }}
          DEPLOY_VM_USER: ${{ secrets.DEPLOY_VM_USER }}
          DEPLOY_TAG: ${{ steps.tag.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
          DEPLOY_VM_PORT: ${{ vars.DEPLOY_VM_PORT }}
          DEPLOY_KEY_PATH: ${{ steps.prepare_ssh_key.outputs.key_path }}
          KNOWN_HOSTS_PATH: ${{ steps.verify_host_key.outputs.known_hosts_path }}
        run: |
          set -euo pipefail

          DEPLOY_PORT="${DEPLOY_VM_PORT:-22}"
          if [[ ! "$DEPLOY_PORT" =~ ^[0-9]+$ ]]; then
            echo "ERROR: DEPLOY_VM_PORT must be numeric." >&2
            exit 1
          fi

          if [[ -z "${DEPLOY_VM_HOST:-}" || -z "${DEPLOY_VM_USER:-}" || -z "${DEPLOY_KEY_PATH:-}" || -z "${KNOWN_HOSTS_PATH:-}" ]]; then
            echo "ERROR: missing required deploy inputs (host/user/key/known_hosts)." >&2
            exit 1
          fi

          DEPLOY_LOG_PATH="$RUNNER_TEMP/deploy-vm-ssh.log"
          if ssh \
            -i "$DEPLOY_KEY_PATH" \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$KNOWN_HOSTS_PATH" \
            -o ConnectTimeout=10 \
            -p "$DEPLOY_PORT" \
            "${DEPLOY_VM_USER}@${DEPLOY_VM_HOST}" \
            "set -eu; \
            if [ ! -x \"\$HOME/.local/bin/uv\" ]; then echo \"ERROR: missing remote binary \$HOME/.local/bin/uv\" >&2; exit 21; fi; \
            \"\$HOME/.local/bin/uv\" tool install --reinstall \"git+https://github.com/${REPOSITORY}@${DEPLOY_TAG}\"; \
            if [ ! -x \"\$HOME/.local/bin/specify\" ]; then echo \"ERROR: missing remote binary \$HOME/.local/bin/specify\" >&2; exit 22; fi; \
            if \"\$HOME/.local/bin/specify\" --help > /tmp/specify-help.txt 2>/tmp/specify-help.err; then \
              echo \"__SMOKE_STATUS__:passed\"; \
              echo \"__SMOKE_EXIT__:0\"; \
              head -n 20 /tmp/specify-help.txt; \
            else \
              smoke_exit=\$?; \
              echo \"__SMOKE_STATUS__:failed\"; \
              echo \"__SMOKE_EXIT__:\$smoke_exit\"; \
              cat /tmp/specify-help.err >&2 || true; \
              exit \$smoke_exit; \
            fi" \
            > "$DEPLOY_LOG_PATH" 2>&1; then
            SSH_EXIT_CODE=0
          else
            SSH_EXIT_CODE=$?
          fi

          SMOKE_STATUS="not_reached"
          SMOKE_EXIT_CODE="n/a"
          if [[ -f "$DEPLOY_LOG_PATH" ]]; then
            if grep -q "^__SMOKE_STATUS__:passed$" "$DEPLOY_LOG_PATH"; then
              SMOKE_STATUS="passed"
              SMOKE_EXIT_CODE="0"
            elif grep -q "^__SMOKE_STATUS__:failed$" "$DEPLOY_LOG_PATH"; then
              SMOKE_STATUS="failed"
              SMOKE_EXIT_CODE="$(awk -F: '/^__SMOKE_EXIT__:/ {print $2; exit}' "$DEPLOY_LOG_PATH")"
            fi
          fi

          echo "ssh_exit_code=$SSH_EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "deploy_log_path=$DEPLOY_LOG_PATH" >> "$GITHUB_OUTPUT"
          echo "smoke_status=$SMOKE_STATUS" >> "$GITHUB_OUTPUT"
          echo "smoke_exit_code=$SMOKE_EXIT_CODE" >> "$GITHUB_OUTPUT"

          if [[ "$SSH_EXIT_CODE" -ne 0 ]]; then
            echo "ERROR: remote deployment command failed (exit $SSH_EXIT_CODE)." >&2
            tail -n 80 "$DEPLOY_LOG_PATH" >&2 || true
            exit "$SSH_EXIT_CODE"
          fi

      - name: Cleanup SSH artifacts
        if: always()
        shell: bash
        env:
          DEPLOY_KEY_PATH: ${{ steps.prepare_ssh_key.outputs.key_path }}
          KNOWN_HOSTS_PATH: ${{ steps.verify_host_key.outputs.known_hosts_path }}
        run: |
          set -euo pipefail
          if [[ -n "${DEPLOY_KEY_PATH:-}" && -f "${DEPLOY_KEY_PATH}" ]]; then
            if command -v shred >/dev/null 2>&1; then
              shred -u "${DEPLOY_KEY_PATH}" || rm -f "${DEPLOY_KEY_PATH}"
            else
              rm -f "${DEPLOY_KEY_PATH}"
            fi
          fi
          if [[ -n "${KNOWN_HOSTS_PATH:-}" && -f "${KNOWN_HOSTS_PATH}" ]]; then
            if command -v shred >/dev/null 2>&1; then
              shred -u "${KNOWN_HOSTS_PATH}" || rm -f "${KNOWN_HOSTS_PATH}"
            else
              rm -f "${KNOWN_HOSTS_PATH}"
            fi
          fi

      - name: Write deployment summary
        if: always()
        shell: bash
        env:
          SSH_EXIT_CODE: ${{ steps.deploy_native.outputs.ssh_exit_code }}
          DEPLOY_LOG_PATH: ${{ steps.deploy_native.outputs.deploy_log_path }}
          DEPLOY_OUTCOME: ${{ steps.deploy_native.outcome }}
          SMOKE_STATUS: ${{ steps.deploy_native.outputs.smoke_status }}
          SMOKE_EXIT_CODE: ${{ steps.deploy_native.outputs.smoke_exit_code }}
          DEPLOY_VM_PORT: ${{ vars.DEPLOY_VM_PORT }}
        run: |
          {
            DEPLOY_PORT="${DEPLOY_VM_PORT:-22}"
            echo "## Deploy to VM"
            echo ""
            echo "- Repository: \`${{ github.repository }}\`"
            echo "- Tag: \`${{ steps.tag.outputs.tag }}\`"
            echo "- Target: \`${{ secrets.DEPLOY_VM_USER }}@${{ secrets.DEPLOY_VM_HOST }}:${DEPLOY_PORT}\`"
            echo "- Deploy step outcome: \`${DEPLOY_OUTCOME:-n/a}\`"
            echo "- SSH exit code: \`${SSH_EXIT_CODE:-n/a}\`"
            echo "- Smoke test status: \`${SMOKE_STATUS:-n/a}\`"
            echo "- Smoke test exit code: \`${SMOKE_EXIT_CODE:-n/a}\`"
            echo "- Status: completed"
            if [[ -n "${DEPLOY_LOG_PATH:-}" && -f "${DEPLOY_LOG_PATH}" ]]; then
              echo ""
              echo "### Remote Output (tail)"
              echo '```text'
              tail -n 40 "${DEPLOY_LOG_PATH}" || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
