name: Deploy to VM

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (for example v0.0.52)"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: deploy-vm
  cancel-in-progress: false

jobs:
  deploy:
    name: Install specify-cli on GCP VM
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ github.event.release.tag_name || github.event.inputs.tag || github.ref_name }}"
          TAG="${TAG#"${TAG%%[![:space:]]*}"}"
          TAG="${TAG%"${TAG##*[![:space:]]}"}"

          if [[ -z "$TAG" ]]; then
            echo "ERROR: could not resolve release tag (set workflow_dispatch input 'tag')." >&2
            exit 1
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][A-Za-z0-9.]+)?$ ]]; then
            echo "ERROR: invalid tag format '$TAG'. Expected vMAJOR.MINOR.PATCH." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG" >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_VM_HOST }}
          username: ${{ secrets.DEPLOY_VM_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 5m
          script_stop: true
          script: |
            set -eu
            test -x "$HOME/.local/bin/uv"
            "$HOME/.local/bin/uv" tool install --reinstall \
              "git+https://github.com/${{ github.repository }}@${{ steps.tag.outputs.tag }}"
            test -x "$HOME/.local/bin/specify"
            "$HOME/.local/bin/specify" --help > /tmp/specify-help.txt
            head -n 20 /tmp/specify-help.txt

      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo "## Deploy to VM"
            echo ""
            echo "- Repository: \`${{ github.repository }}\`"
            echo "- Tag: \`${{ steps.tag.outputs.tag }}\`"
            echo "- Target: \`${{ secrets.DEPLOY_VM_USER }}@${{ secrets.DEPLOY_VM_HOST }}\`"
            echo "- Status: completed"
          } >> "$GITHUB_STEP_SUMMARY"
