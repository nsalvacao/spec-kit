name: Compliance Guard

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  compliance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run compliance checker
        run: uv run python scripts/python/compliance-checker.py check --repo-root .

      - name: Verify LICENSE is present in release packages
        run: |
          # Build release packages and confirm LICENSE is bundled in each zip
          if [ -f ".github/workflows/scripts/create-release-packages.sh" ]; then
            bash .github/workflows/scripts/create-release-packages.sh v0.0.0
            missing=0
            for zip in .genreleases/*.zip; do
              # If glob produces no matches, the literal pattern string is passed — skip it
              [ -f "$zip" ] || continue
              if ! unzip -l "$zip" | grep -q "LICENSE"; then
                echo "ERROR: LICENSE not found in $zip"
                missing=1
              else
                echo "OK: LICENSE present in $zip"
              fi
            done
            rm -rf .genreleases
            if [ "$missing" -ne 0 ]; then
              exit 1
            fi
          else
            echo "Release package script not found — skipping artifact check."
          fi
