# Spec-Kit Project Configuration
# Location: .specify/spec-kit.yml
# Optional local overrides: .specify/spec-kit.local.yml (recommended gitignored)
#
# Precedence (lowest -> highest):
# 1) Built-in defaults
# 2) .specify/spec-kit.yml
# 3) .specify/spec-kit.local.yml
# 4) SPECIFY_CONFIG__... environment variables

schema_version: 1

scope_detection:
  # Score boundaries:
  # feature_max_score: 34
  # epic_max_score: 64
  # max_total_score: 100

  # Example signal tuning:
  # work_items_multiplier: 5
  # dependency_multiplier: 3
  # integration_multiplier: 3
  # domain_multiplier: 10
  # cross_team_multiplier: 6

  # Example keyword overrides:
  # complexity_keywords:
  #   - platform
  #   - migration
  #   - compliance

productivity_update:
  # Runtime tuning for `specify productivity update`:
  #
  # fuzzy_title_match_threshold: 0.84
  # default_stale_age_days: 30
  # max_comprehensive_scan_files: 80
  # max_comprehensive_scan_file_bytes: 200000
  #
  # Optional lexical filters:
  # common_entity_stopwords:
  #   - TODO
  #   - FIXME
  # common_entity_verbish:
  #   - review
  #   - update

strategic_review:
  # Runtime tuning for strategic readiness scoring and blocker extraction:
  # Required keys under this section:
  # - weights.output_quality, readme_docs_quality, developer_experience,
  #   security_trust, competitive_positioning, test_coverage
  # - thresholds.green_min_score, thresholds.yellow_min_score
  # - blockers.emit_on_bands, blockers.max_items
  # - validator.min_sections, validator.min_line_count
  # Validation rules:
  # - weights must sum to exactly 1.0
  # - thresholds must be between 0 and 5 (yellow <= green)
  # - blockers.max_items must be between 1 and 200
  # - validator.min_sections must be >= 8
  # - validator.min_line_count must be between 40 and 5000
  #
  # weights:
  #   output_quality: 0.25
  #   readme_docs_quality: 0.20
  #   developer_experience: 0.20
  #   security_trust: 0.15
  #   competitive_positioning: 0.10
  #   test_coverage: 0.10
  #
  # thresholds:
  #   green_min_score: 4.0
  #   yellow_min_score: 3.0
  #
  # blockers:
  #   emit_on_bands: [YELLOW, RED]
  #   max_items: 20
  #
  # validator:
  #   min_sections: 8
  #   min_line_count: 120
